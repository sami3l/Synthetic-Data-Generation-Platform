services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: synth-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synth_gen}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2001}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

      - "5432"  
    networks:
      - synth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and background tasks
  redis:
    image: redis:7-alpine
    container_name: synth-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - synth-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./synth-backend
      dockerfile: Dockerfile
    container_name: synth-backend
    environment:
      # Database
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-2001}@postgres:5432/${POSTGRES_DB:-synth_gen}
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-2001}@postgres:5432/${POSTGRES_DB:-synth_gen}
      
      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-here}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_BUCKET_NAME: ${SUPABASE_BUCKET_NAME:-synthetic-datasets}
      
      # Application
      DEBUG: ${DEBUG:-False}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8000}
      
      # Redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./synth-backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synth-network
    restart: unless-stopped

  # Frontend React Native Web
  frontend:
    build:
      context: ./synthetic-data-platform
      dockerfile: Dockerfile
    container_name: synth-frontend
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "8081:8081"
    volumes:
      - ./synthetic-data-platform:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - synth-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: synth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - synth-network
    restart: unless-stopped

  # Background Worker for ML tasks
  worker:
    build:
      context: ./synth-backend
      dockerfile: Dockerfile
    container_name: synth-worker
    command: python -m app.worker.main
    environment:
      # Same as backend
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-2001}@postgres:5432/${POSTGRES_DB:-synth_gen}
      REDIS_URL: redis://redis:6379/0
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_BUCKET_NAME: ${SUPABASE_BUCKET_NAME:-synthetic-datasets}
    volumes:
      - ./synth-backend:/app
      - worker_data:/app/worker_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synth-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  worker_data:
  nginx_logs:

networks:
  synth-network:
    driver: bridge
